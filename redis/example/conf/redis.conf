# Redis 示例配置
# 从 example/conf/ 复制到 redis/conf/ 后生效

bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# 数据持久化
dir /data
appendonly yes
appendfsync everysec

# 内存限制
maxmemory 256mb
maxmemory-policy allkeys-lru

# 安全（如需关闭认证可注释掉）
requirepass 223456

# 日志
logfile /var/log/redis/redis.log
loglevel notice

# 数据库数量
databases 16
