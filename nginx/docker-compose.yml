version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:rw
      - ./nginx/logs:/var/log/nginx:rw
      - ./nginx/shared:/shared
    restart: unless-stopped
    networks:
      - nginx-network

networks:
  nginx-network:
    driver: bridge
