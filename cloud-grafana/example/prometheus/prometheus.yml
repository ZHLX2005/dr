# Prometheus 示例配置
# 从 example/prometheus/ 复制到 cloud-grafana/prometheus.yml 后生效

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

