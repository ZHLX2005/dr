version: '3.8'

services:
  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/shared:/shared
    restart: unless-stopped
    networks:
      - traefik-net

networks:
  traefik-net:
    driver: bridge
